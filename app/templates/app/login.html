{% extends 'app/base.html' %}

{% block content %}
<div class="auth-container glass-panel">
    <div class="auth-header">
        <i class="fa-solid fa-user-lock text-primary"></i>
        <h1 class="font-black">Welcome Back</h1>
        <p class="text-muted">Sign in to continue your fashion journey</p>
    </div>

    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group mb-20">
            <label class="font-bold mb-8 block text-small">{{ field.label }}</label>
            <input type="{{ field.field.widget.input_type|default:'text' }}" name="{{ field.html_name }}"
                id="{{ field.id_for_label }}" class="form-input" placeholder="Enter your {{ field.label|lower }}" required>
            {% if field.errors %}
            <p class="text-error text-small mt-5">{{ field.errors.0 }}</p>
            {% endif %}
        </div>
        {% endfor %}

        <button type="submit" class="btn btn-primary btn-large mt-20">AUTHORIZE ACCESS</button>
    </form>

    <div class="text-center mt-30">
        <a href="{% url 'password_reset' %}" class="text-primary text-small font-bold">Forgot Password?</a>
    </div>

    <div class="text-center mt-30 pt-20 border-top">
        <p class="text-muted text-small">
            New here? <a href="{% url 'register' %}" class="text-primary font-bold">Create Account</a>
        </p>
    </div>
</div>
{% endblock %}
