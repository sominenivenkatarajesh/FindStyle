{% extends 'app/base.html' %}

{% block title %}Password Changed - MegaStore{% endblock %}

{% block content %}
<div class="glass-panel" style="max-width: 500px; margin: 40px auto; text-align: center;">
    <div style="font-size: 3rem; margin-bottom: 20px; color: var(--primary);">✓</div>
    <h1 style="margin-bottom: 20px;">Password Updated Successfully!</h1>
    <p style="color: var(--text-muted); margin-bottom: 30px; line-height: 1.6;">
        Your password has been successfully reset. You can now log in with your new password.
    </p>
    <a href="{% url 'login' %}" class="btn btn-primary" style="display: inline-block;">Log In</a>
</div>
{% endblock %}
